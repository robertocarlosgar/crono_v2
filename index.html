<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Contador">
  <meta name="theme-color" content="#0a0a0f">
  <title>Contador</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --accent: #e8ff47;
      --accent2: #ff4757;
      --text: #f0f0f0;
      --muted: #555570;
      --ring-size: min(72vw, 340px);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100svh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* Background animation canvas */
    #bgCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      opacity: 0.35;
      pointer-events: none;
    }

    .app { position: relative; z-index: 1; }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 36px;
      padding: 24px;
      width: 100%;
    }

    /* Header */
    .header {
      text-align: center;
    }

    .title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 0.35em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .phase-label {
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-top: 4px;
      min-height: 16px;
      transition: opacity 0.3s;
    }

    /* Ring */
    .ring-wrapper {
      position: relative;
      width: var(--ring-size);
      height: var(--ring-size);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ring-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-bg {
      fill: none;
      stroke: var(--surface);
      stroke-width: 3;
    }

    .ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.3s linear, stroke 0.3s;
    }

    .ring-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .time-display {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(72px, 20vw, 96px);
      line-height: 1;
      color: var(--text);
      letter-spacing: 0.04em;
      transition: color 0.2s;
    }

    .time-display.beep-flash {
      color: var(--accent);
    }

    .time-unit {
      font-size: 11px;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Pulse ring on active */
    .ring-wrapper.active .ring-svg {
      filter: drop-shadow(0 0 12px rgba(232,255,71,0.3));
    }

    .ring-wrapper.beeping .ring-svg {
      filter: drop-shadow(0 0 24px rgba(232,255,71,0.7));
    }

    /* Controls */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 300px;
    }

    .btn-main {
      width: 100%;
      height: 60px;
      background: var(--accent);
      color: #0a0a0f;
      border: none;
      border-radius: 4px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.15em;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    .btn-main:active {
      transform: scale(0.97);
      box-shadow: 0 0 0 3px rgba(232,255,71,0.3);
    }

    .btn-main.running {
      background: var(--surface);
      color: var(--accent2);
      border: 1px solid var(--accent2);
    }

    .btn-reset {
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      cursor: pointer;
      text-transform: uppercase;
      padding: 8px 16px;
      transition: color 0.2s;
    }

    .btn-reset:active { color: var(--text); }

    /* Tick dots */
    .tick-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .tick-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--muted);
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }

    .tick-dot.lit {
      background: var(--accent);
      border-color: var(--accent);
      transform: scale(1.3);
      box-shadow: 0 0 6px var(--accent);
    }

    /* Status line */
    .status {
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-align: center;
      min-height: 16px;
    }

  </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="app">
  <div class="header">
    <div class="title">Contador · Entrenamiento</div>
    <div class="phase-label" id="phaseLabel">— listo —</div>
  </div>

  <div class="ring-wrapper" id="ringWrapper">
    <svg class="ring-svg" id="ringSvg" viewBox="0 0 100 100">
      <circle class="ring-bg" cx="50" cy="50" r="46"/>
      <circle class="ring-progress" id="ringProgress" cx="50" cy="50" r="46"/>
    </svg>
    <div class="ring-center">
      <div class="time-display" id="timeDisplay">00</div>
      <div class="time-unit" id="timeUnit">seg</div>
    </div>
  </div>

  <div class="tick-row" id="tickRow">
    <div class="tick-dot" id="d0"></div>
    <div class="tick-dot" id="d1"></div>
    <div class="tick-dot" id="d2"></div>
    <div class="tick-dot" id="d3"></div>
    <div class="tick-dot" id="d4"></div>
    <div class="tick-dot" id="d5"></div>
    <div class="tick-dot" id="d6"></div>
    <div class="tick-dot" id="d7"></div>
    <div class="tick-dot" id="d8"></div>
    <div class="tick-dot" id="d9"></div>
  </div>

  <div class="controls">
    <button class="btn-main" id="btnMain" onclick="toggleTimer()">INICIAR</button>
    <button class="btn-reset" id="btnReset" onclick="resetTimer()">Reiniciar</button>
  </div>

  <div class="status" id="status">Pulsa iniciar para comenzar</div>
</div>

<script>
  // ── Audio ───────────────────────────────────────────────────────────────────
  let ctx = null;

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  }

  function beep(freq = 880, dur = 0.08, vol = 0.6, type = 'sine') {
    const ac = getCtx();
    if (ac.state === 'suspended') ac.resume();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + dur + 0.01);
  }

  function beepCountdown() { beep(660, 0.08, 0.5, 'sine'); }
  function beepStart()     { beep(1040, 0.18, 0.7, 'sine'); setTimeout(() => beep(1040, 0.14, 0.5), 220); }
  function beepMark()      { beep(880, 0.12, 0.6, 'sine'); }

  // ── State ───────────────────────────────────────────────────────────────────
  const COUNTDOWN_SECS = 10;
  const MARK_A = 40;     // first mark after start
  const MARK_INTERVAL = 10; // subsequent marks

  let state = 'idle';  // idle | countdown | running
  let elapsed = 0;
  let intervalId = null;
  let tickTimeout = null;

  // ── DOM refs ────────────────────────────────────────────────────────────────
  const timeDisplay = document.getElementById('timeDisplay');
  const timeUnit    = document.getElementById('timeUnit');
  const phaseLabel  = document.getElementById('phaseLabel');
  const btnMain     = document.getElementById('btnMain');
  const status      = document.getElementById('status');
  const ringWrapper = document.getElementById('ringWrapper');
  const ring        = document.getElementById('ringProgress');
  const dots        = Array.from({length: 10}, (_, i) => document.getElementById('d' + i));

  const CIRCUM = 2 * Math.PI * 46; // ≈ 289
  ring.style.strokeDasharray = CIRCUM;
  ring.style.strokeDashoffset = CIRCUM;

  // ── Render ──────────────────────────────────────────────────────────────────
  function setRing(fraction, color) {
    ring.style.strokeDashoffset = CIRCUM * (1 - fraction);
    ring.style.stroke = color || 'var(--accent)';
  }

  function flash() {
    timeDisplay.classList.add('beep-flash');
    ringWrapper.classList.add('beeping');
    clearTimeout(tickTimeout);
    tickTimeout = setTimeout(() => {
      timeDisplay.classList.remove('beep-flash');
      ringWrapper.classList.remove('beeping');
    }, 200);
  }

  function updateDots(active) {
    dots.forEach((d, i) => d.classList.toggle('lit', i < active));
  }

  function render() {
    if (state === 'idle') {
      timeDisplay.textContent = '00';
      timeUnit.textContent = 'seg';
      phaseLabel.textContent = '— listo —';
      status.textContent = 'Pulsa iniciar para comenzar';
      setRing(0);
      ring.style.stroke = 'var(--accent)';
      updateDots(0);
      btnMain.textContent = 'INICIAR';
      btnMain.classList.remove('running');
      ringWrapper.classList.remove('active');
    } else if (state === 'countdown') {
      const rem = COUNTDOWN_SECS - elapsed;
      timeDisplay.textContent = String(rem).padStart(2, '0');
      timeUnit.textContent = 'seg';
      phaseLabel.textContent = '● cuenta atrás';
      status.textContent = `Comenzando en ${rem}…`;
      setRing((elapsed) / COUNTDOWN_SECS, 'var(--muted)');
      updateDots(COUNTDOWN_SECS - rem);
      btnMain.textContent = 'DETENER';
      btnMain.classList.add('running');
      ringWrapper.classList.add('active');
    } else if (state === 'running') {
      timeDisplay.textContent = String(elapsed).padStart(2, '0');
      timeUnit.textContent = 'seg';
      // ring: 0–40 fill accent; after 40 cycles 10s intervals
      let frac, ringColor;
      if (elapsed <= MARK_A) {
        frac = elapsed / MARK_A;
        ringColor = 'var(--accent)';
      } else {
        const since = elapsed - MARK_A;
        frac = (since % MARK_INTERVAL) / MARK_INTERVAL;
        ringColor = 'var(--accent)';
      }
      setRing(frac, ringColor);
      updateDots(elapsed % 10);
      phaseLabel.textContent = elapsed < MARK_A ? '▶ corriendo' : '▶ marcando';
      status.textContent = elapsed < MARK_A
        ? `Próxima marca en ${MARK_A - elapsed}s`
        : `Próxima marca en ${MARK_INTERVAL - (elapsed - MARK_A) % MARK_INTERVAL}s`;
      btnMain.textContent = 'DETENER';
      btnMain.classList.add('running');
      ringWrapper.classList.add('active');
    }
  }

  // ── Tick ─────────────────────────────────────────────────────────────────────
  function tick() {
    elapsed++;

    if (state === 'countdown') {
      const rem = COUNTDOWN_SECS - elapsed;
      if (rem > 0) {
        beepCountdown();
        flash();
      } else {
        // Countdown done → start
        state = 'running';
        elapsed = 0;
        beepStart();
        flash();
      }
    } else if (state === 'running') {
      if (elapsed === MARK_A) {
        beepMark();
        flash();
      } else if (elapsed > MARK_A && (elapsed - MARK_A) % MARK_INTERVAL === 0) {
        beepMark();
        flash();
      }
    }

    render();
  }

  // ── Controls ─────────────────────────────────────────────────────────────────
  function toggleTimer() {
    getCtx();

    if (state === 'idle') {
      // Start countdown
      state = 'countdown';
      elapsed = 0;
      if (window.setCanvasAccent) window.setCanvasAccent(true);
      render();
      intervalId = setInterval(tick, 1000);
    } else if (state === 'countdown') {
      // Still in countdown -> cancel and reset fully
      resetTimer();
    } else if (state === 'running') {
      // Already running -> stop but keep elapsed visible
      clearInterval(intervalId);
      state = 'idle';
      if (window.setCanvasAccent) window.setCanvasAccent(false);
      btnMain.textContent = 'INICIAR';
      btnMain.classList.remove('running');
      ringWrapper.classList.remove('active');
      phaseLabel.textContent = '— detenido —';
      status.textContent = 'Pulsa iniciar para reanudar';
    }
  }

  function stopTimer() {
    clearInterval(intervalId);
    state = 'idle';
    elapsed = 0;
    if (window.setCanvasAccent) window.setCanvasAccent(false);
    render();
  }

  function resetTimer() {
    stopTimer();
  }

  render();

  // ── Service Worker ───────────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // ── Keep screen awake ────────────────────────────────────────────────────────
  // 1) WakeLock API (Chrome/Android, partial iOS 17+)
  if ('wakeLock' in navigator) {
    let wakeLock = null;
    async function requestWakeLock() {
      try { wakeLock = await navigator.wakeLock.request('screen'); } catch {}
    }
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });
    requestWakeLock();
  }

  // ── Background canvas animation + iOS screen-wake video ─────────────────────
  (function setupCanvas() {
    const canvas = document.getElementById('bgCanvas');
    const c = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const PARTICLE_COUNT = 38;
    const particles = Array.from({ length: PARTICLE_COUNT }, () => ({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.8 + 0.4,
      vx: (Math.random() - 0.5) * 0.18,
      vy: (Math.random() - 0.5) * 0.18,
      alpha: Math.random() * 0.6 + 0.2,
      pulse: Math.random() * Math.PI * 2,
      pulseSpeed: 0.008 + Math.random() * 0.012,
    }));

    const MAX_DIST = 130;
    let accentActive = false;

    function drawFrame() {
      const W = canvas.width, H = canvas.height;
      c.clearRect(0, 0, W, H);
      const baseColor = accentActive ? '232,255,71' : '80,80,120';

      particles.forEach(p => {
        p.x += p.vx; p.y += p.vy; p.pulse += p.pulseSpeed;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        const a = p.alpha * (0.6 + 0.4 * Math.sin(p.pulse));
        c.beginPath();
        c.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        c.fillStyle = 'rgba(' + baseColor + ',' + a + ')';
        c.fill();
      });

      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < MAX_DIST) {
            const a = (1 - dist / MAX_DIST) * 0.12;
            c.beginPath();
            c.moveTo(particles[i].x, particles[i].y);
            c.lineTo(particles[j].x, particles[j].y);
            c.strokeStyle = 'rgba(' + baseColor + ',' + a + ')';
            c.lineWidth = 0.8;
            c.stroke();
          }
        }
      }
      requestAnimationFrame(drawFrame);
    }

    drawFrame();
    window.setCanvasAccent = function(on) { accentActive = on; };

    // Pipe live canvas into a <video> -- iOS treats it as real video and stays awake
    function startVideoHack() {
      try {
        const stream = canvas.captureStream(10);
        const vid = document.createElement('video');
        vid.srcObject = stream;
        vid.setAttribute('playsinline', '');
        vid.muted = true;
        vid.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0.01;pointer-events:none;z-index:-1;top:0;left:0;';
        document.body.appendChild(vid);
        vid.play().catch(function() {});
        vid.addEventListener('pause', function() { vid.play().catch(function() {}); });
        document.addEventListener('visibilitychange', function() {
          if (document.visibilityState === 'visible') vid.play().catch(function() {});
        });
      } catch(e) { console.warn('captureStream not supported', e); }
    }

    document.addEventListener('click',      startVideoHack, { once: true });
    document.addEventListener('touchstart', startVideoHack, { once: true });
  })();
</script>
</body>
</html>
